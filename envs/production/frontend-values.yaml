image:
  repository: 138537744457.dkr.ecr.eu-west-1.amazonaws.com/warehouse-frontend
  tag: 6d1818ada93491efe65f6b5d58bea7d2a57be13e
  pullPolicy: Always
imagePullSecrets: []
replicaCount: 2
ingress:
  enabled: true
  className: nginx
  annotations:
    # NLB (L4) terminates TLS and sets no X-Forwarded-Proto, so nginx can't
    # detect scheme reliably; ssl-redirect: true loops https->https forever.
    # NLB's ssl-ports annotation already enforces TLS on the client side.
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
  hosts:
    - host: warehousems.online
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - warehousems.online

resources:
  requests:
    cpu: 50m
    memory: 96Mi
  limits:
    cpu: 200m
    memory: 192Mi

env:
  - name: FRONTEND_BASE_URL
    value: "https://warehousems.online"
  - name: SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: frontend-secret
        key: secret-key
  - name: BACKEND_URL
    value: "http://backend:8080"
  - name: AUTH_SERVICE_URL
    value: "http://auth-service:8080"
  - name: FLASK_ENV
    value: "production"