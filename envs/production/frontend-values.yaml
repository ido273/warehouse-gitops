image:
  repository: 138537744457.dkr.ecr.eu-west-1.amazonaws.com/warehouse-frontend
  tag: aa72da6f4b9e8b1f7d863dbb38d929a15787faf6
  pullPolicy: Always
imagePullSecrets: []
replicaCount: 2
ingress:
  enabled: true
  className: nginx
  annotations:
    # NLB (L4) terminates TLS and sets no X-Forwarded-Proto, so nginx can't
    # detect scheme reliably; ssl-redirect: true loops https->https forever.
    # NLB's ssl-ports annotation already enforces TLS on the client side.
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
  hosts:
    - host: warehousems.online
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - warehousems.online

env:
  - name: FRONTEND_BASE_URL
    value: "https://warehousems.online"