# apps/secrets/secret-store.yaml
#
# Implemented as a ClusterSecretStore, not a namespaced SecretStore. The
# IRSA-bound ServiceAccount ("external-secrets") lives in the
# "external-secrets" namespace (see warehouse-infra modules/eks IRSA
# binding: namespace_service_accounts = ["external-secrets:external-secrets"]),
# but the ExternalSecrets that use this store live in "warehouse". A
# namespaced SecretStore can only reference a ServiceAccount in its own
# namespace, so cross-namespace auth requires a ClusterSecretStore with an
# explicit serviceAccountRef.namespace.
#
# No IRSA role ARN literal is needed here — warehouse-infra's Terraform
# annotates the "external-secrets" ServiceAccount with
# eks.amazonaws.com/role-arn automatically (module.eks.external_secrets_role_arn,
# also exposed as the root Terraform output "external_secrets_role_arn" if
# you need to verify it post-apply).
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-west-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
