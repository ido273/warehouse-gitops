# apps/secrets/app-external-secret.yaml
#
# NOTE: the "warehouse/app-secrets" secret does not exist yet in AWS Secrets
# Manager — it must be created there before this ExternalSecret can sync.
# Required keys: jwt-secret, flask-secret, database-url.
#
#   jwt-secret / flask-secret: pull from warehouse-infra once applied —
#     terraform output -raw jwt_secret
#     terraform output -raw flask_secret
#   database-url: mysql+pymysql://warehouse_user:<warehouse/mysql "password">@mysql/warehouse_db
#     (the mysql password is the "password" key in the "warehouse/mysql" secret)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-secrets
  namespace: warehouse
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: app-secrets
    creationPolicy: Owner
  data:
    - secretKey: jwt-secret
      remoteRef:
        key: warehouse/app-secrets
        property: jwt-secret
    - secretKey: flask-secret
      remoteRef:
        key: warehouse/app-secrets
        property: flask-secret
    - secretKey: database-url
      remoteRef:
        key: warehouse/app-secrets
        property: database-url
