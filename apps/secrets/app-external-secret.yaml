# apps/secrets/app-external-secret.yaml
#
# NOTE: the "warehouse/app-secrets" secret must exist in AWS Secrets Manager
# before this ExternalSecret can sync. Required keys: jwt-secret,
# flask-secret, database-url. warehouse-infra no longer generates these via
# Terraform (random_password was removed — it regenerated a new value on
# every apply, desyncing from anything relying on the old one after a
# destroy+apply) — create/rotate this secret manually:
#
#   aws secretsmanager create-secret \
#     --name "warehouse/app-secrets" \
#     --region eu-west-1 \
#     --secret-string '{
#       "jwt-secret": "CHOOSE_STRONG_SECRET_HERE",
#       "flask-secret": "CHOOSE_STRONG_SECRET_HERE",
#       "database-url": "mysql+pymysql://warehouse_user:<warehouse/mysql \"password\">@mysql/warehouse_db"
#     }'
#
# (the mysql password is the "password" key in the "warehouse/mysql" secret)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-secrets
  namespace: warehouse
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: app-secrets
    creationPolicy: Owner
  data:
    - secretKey: jwt-secret
      remoteRef:
        key: warehouse/app-secrets
        property: jwt-secret
    - secretKey: flask-secret
      remoteRef:
        key: warehouse/app-secrets
        property: flask-secret
    - secretKey: database-url
      remoteRef:
        key: warehouse/app-secrets
        property: database-url
