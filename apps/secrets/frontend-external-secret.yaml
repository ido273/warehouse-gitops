# apps/secrets/frontend-external-secret.yaml
#
# Reuses the same "flask-secret" value from "warehouse/app-secrets" as
# app-external-secret.yaml — frontend and backend share one Flask secret.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: frontend-secret
  namespace: warehouse
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: frontend-secret
    creationPolicy: Owner
  data:
    - secretKey: secret-key
      remoteRef:
        key: warehouse/app-secrets
        property: flask-secret
